<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>学生评分</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; }
  label { display: block; margin: 15px 0; }
  select, input { width: 100%; padding: 6px; font-size: 14px; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  p { color: red; font-size: 14px; }
</style>
</head>
<body>

<h2>提交评分</h2>

<!-- 直接写死小组列表 -->
<label>选择小组
<select id="groupSelect">
  <option value="1">小组1</option>
  <option value="2">小组2</option>
  <option value="3">小组3</option>
  <option value="4">小组4</option>
  <option value="5">小组5</option>
  <option value="6">小组6</option>
  <option value="7">小组7</option>
  <option value="8">小组8</option>
  <option value="9">小组9</option>
  <option value="10">小组10</option>
  <option value="11">小组11</option>
  <option value="12">小组12</option>
  <option value="13">小组13</option>
  <option value="14">小组14</option>
  <option value="15">小组15</option>
  <option value="16">小组16</option>
  <option value="17">小组17</option>
  <option value="18">小组18</option>
  <option value="19">小组19</option>
  <option value="20">小组20</option>
  <option value="21">小组21</option>
  <option value="22">小组22</option>
  <option value="23">小组23</option>
  <option value="24">小组24</option>
  <option value="25">小组25</option>
  <option value="26">小组26</option>
  <option value="27">小组27</option>
  <option value="28">小组28</option>
</select>
    <!-- 需要修改小组数量时，直接在这里增加或删除 option -->
  </select>
</label>

<label>评分 (0-5)
  <input type="number" id="scoreInput" min="0" max="5" placeholder="请输入分数">
</label>

<button id="submitBtn">生成提交文件</button>

<p>⚠️ 请将生成的 JSON 文件发给教师汇总</p>

<script>
const groupSelect = document.getElementById('groupSelect');
const scoreInput = document.getElementById('scoreInput');
const submitBtn = document.getElementById('submitBtn');

submitBtn.onclick = () => {
  const groupId = groupSelect.value;
  const score = scoreInput.value.trim();

  if (!groupId || !score) {
    alert('请填写小组和评分');
    return;
  }

  const submission = {
    groupId: groupId,
    score: Number(score),
    time: new Date().toISOString()
  };

  const blob = new Blob([JSON.stringify(submission, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `submission_group${groupId}_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);

  alert('已生成 JSON 文件，请发送给教师');
  scoreInput.value = '';
};
</script>

</body>
</html>
