<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>教师端 - 小组管理</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>教师端 - 小组管理</h1>

<label>新增小组：
  <input type="text" id="newGroupName" placeholder="小组名称">
  <button id="addBtn">添加</button>
</label>

<h3>现有小组：</h3>
<ul id="groupList"></ul>

<h3>学生提交汇总（Google Sheets）</h3>
<iframe id="submissionsFrame" src="https://docs.google.com/spreadsheets/d/e/YOUR_GOOGLE_SHEET_ID/pubhtml?widget=true&amp;headers=false" width="600" height="400"></iframe>

<p>⚠️ 修改小组完成后，将 groups.json 上传到 GitHub 仓库，学生端即可同步。</p>

<script src="js/main.js"></script>
<script>
const groupListEl = document.getElementById('groupList');
let groups = [];

// 加载小组列表
fetchGroups('https://cdn.jsdelivr.net/gh/guozyi/class-evaluation/groups.json', data=>{
  groups = data;
  renderTeacherGroups(groups, groupListEl);
});

// 添加小组按钮
document.getElementById('addBtn').onclick = ()=>{
  const name = document.getElementById('newGroupName').value;
  addGroup(groups, name, groupListEl);
  document.getElementById('newGroupName').value='';
  console.log("最新小组数据(JSON):", JSON.stringify(groups, null,2));
};
</script>
</body>
</html>
