<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>教师端 - 小组管理</title>
  <style>
    body{font-family:"Microsoft YaHei"; padding:2rem;}
    input, button{margin:0.5rem;}
    ul{margin-top:1rem;}
  </style>
</head>
<body>
  <h1>教师端 - 小组管理</h1>

  <label>新增小组：
    <input type="text" id="newGroupName" placeholder="小组名称">
    <button onclick="addGroup()">添加</button>
  </label>

  <h3>现有小组：</h3>
  <ul id="groupList"></ul>

  <p>⚠️ 提示：修改完成后，请将 groups.json 上传或提交到 GitHub，学生端才能看到最新数据。</p>

  <script>
    const groupListEl = document.getElementById('groupList');
    let groups = [];

    // 初始加载
    fetch('https://cdn.jsdelivr.net/gh/wzn1/class-evaluation/groups.json')
      .then(res => res.json())
      .then(data => {
        groups = data;
        renderGroups();
      });

    function renderGroups(){
      groupListEl.innerHTML = '';
      groups.forEach((g, idx)=>{
        const li = document.createElement('li');
        li.textContent = g.name + ' ';
        const btn = document.createElement('button');
        btn.textContent = '删除';
        btn.onclick = ()=>{ groups.splice(idx,1); renderGroups(); };
        li.appendChild(btn);
        groupListEl.appendChild(li);
      });
    }

    function addGroup(){
      const name = document.getElementById('newGroupName').value.trim();
      if(name){
        groups.push({id:groups.length+1, name});
        renderGroups();
        document.getElementById('newGroupName').value = '';
      }
    }

    // 教师端修改后，手动复制 groups 数组内容，更新 groups.json 即可
    console.log("最新小组数据（复制到 groups.json 并提交）:", JSON.stringify(groups, null, 2));
  </script>
</body>
</html>
