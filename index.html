<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>学生端 - 小组列表</title>
  <style>
    body{font-family:"Microsoft YaHei"; padding:2rem;}
    ul{margin-top:1rem;}
  </style>
</head>
<body>
  <h1>学生端 - 小组列表</h1>
  <ul id="studentGroupList"></ul>

  <script>
    const studentListEl = document.getElementById('studentGroupList');

    function loadGroups(){
      fetch('https://cdn.jsdelivr.net/gh/wzn1/class-evaluation/groups.json')
        .then(res => res.json())
        .then(data => {
          studentListEl.innerHTML = '';
          data.forEach(g=>{
            const li = document.createElement('li');
            li.textContent = g.name;
            studentListEl.appendChild(li);
          });
        })
        .catch(err=>{
          studentListEl.innerHTML = '小组数据加载失败';
          console.error(err);
        });
    }

    loadGroups();
  </script>
</body>
</html>
